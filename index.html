<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 12 - Web OS Experience</title>
    <style>
        /* ==========================================================================
           CORE DESIGN SYSTEM & VARIABLES
           ========================================================================== */
        :root {
            --accent: #0067c0;
            --glass-bg: rgba(20, 20, 20, 0.55);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(30px) saturate(150%);
            --win-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
            --hover-bg: rgba(255, 255, 255, 0.08);
            --active-bg: rgba(255, 255, 255, 0.12);
            --input-bg: rgba(0, 0, 0, 0.3);
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.4);
            --bg-wallpaper: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
        }

        [data-theme="light"] {
            --glass-bg: rgba(245, 245, 245, 0.65);
            --glass-border: rgba(0, 0, 0, 0.1);
            --win-bg: #f3f3f3;
            --text-main: #111111;
            --text-secondary: #555555;
            --hover-bg: rgba(0, 0, 0, 0.06);
            --active-bg: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; user-select: none; }
        
        body {
            height: 100vh; width: 100vw; overflow: hidden;
            background: var(--bg-wallpaper) center/cover no-repeat;
            color: var(--text-main); font-size: 14px;
            transition: transform 1s ease-in-out; /* For easter eggs */
        }

        .mica { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); box-shadow: var(--shadow-lg); }

        /* ==========================================================================
           FULL SCREEN OVERLAYS (Boot, Logon, Shutdown)
           ========================================================================== */
        .fullscreen-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 99999; transition: opacity 0.8s ease, backdrop-filter 0.8s ease;
        }
        
        #boot-screen { background: #000; color: white; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 30px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #logon-screen { background: inherit; backdrop-filter: blur(40px) brightness(0.7); }
        .avatar-large { width: 120px; height: 120px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: bold; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .logon-name { font-size: 32px; font-weight: 600; margin-bottom: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); color: white;}
        .logon-input-group { display: flex; align-items: center; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 5px 5px 5px 20px; width: 300px; backdrop-filter: blur(10px);}
        .logon-input { flex: 1; background: transparent; border: none; outline: none; color: white; font-size: 16px; }
        .logon-input::placeholder { color: rgba(255,255,255,0.6); }
        .logon-btn { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.2); border: none; color: white; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center;}
        .logon-btn:hover { background: rgba(255,255,255,0.4); }

        #shutdown-screen { background: #000; color: white; opacity: 0; pointer-events: none; }

        /* ==========================================================================
           DESKTOP & WINDOW MANAGER
           ========================================================================== */
        #desktop { position: absolute; top: 0; left: 0; right: 0; bottom: 55px; padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, 84px); grid-template-rows: repeat(auto-fill, 96px); grid-auto-flow: column; gap: 4px; z-index: 10; }
        .desktop-icon { width: 84px; height: 96px; border-radius: var(--radius-md); display: flex; flex-direction: column; align-items: center; padding: 8px 4px; cursor: default; transition: background 0.15s; border: 1px solid transparent; }
        .desktop-icon:hover { background: var(--hover-bg); }
        .desktop-icon.selected { background: var(--active-bg); border-color: var(--glass-border); }
        .desktop-icon span { font-size: 38px; margin-bottom: 6px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }
        .desktop-icon p { font-size: 12px; color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.8); text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        #window-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .sys-window { position: absolute; border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; background: var(--win-bg); border: 1px solid var(--glass-border); box-shadow: var(--shadow-lg); pointer-events: auto; transform: scale(0.95); opacity: 0; transition: transform 0.2s, opacity 0.2s; }
        .sys-window.active-anim { transform: scale(1); opacity: 1; }
        .sys-window.active-focus { box-shadow: 0 24px 64px rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.2); }
        .sys-window.maximized { top: 0 !important; left: 0 !important; width: 100vw !important; height: calc(100vh - 50px) !important; border-radius: 0; border: none; }
        
        .win-titlebar { height: 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.1); padding-left: 12px; cursor: default; transition: background 0.2s; }
        .sys-window.active-focus .win-titlebar { background: transparent; }
        .win-drag-handle { flex: 1; height: 100%; display: flex; align-items: center; gap: 10px; }
        .win-controls { display: flex; height: 100%; }
        .win-ctrl-btn { width: 46px; height: 100%; background: transparent; border: none; color: var(--text-main); font-size: 14px; transition: background 0.15s; }
        .win-ctrl-btn:hover { background: var(--hover-bg); }
        .win-ctrl-btn.close:hover { background: #e81123; color: white; }
        .win-content { flex: 1; position: relative; background: var(--win-bg); display: flex; flex-direction: column; overflow: hidden; }

        /* ==========================================================================
           TASKBAR & START MENU
           ========================================================================== */
        #taskbar-wrapper { position: absolute; bottom: 6px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 9000; pointer-events: none; }
        #taskbar { height: 48px; border-radius: 24px; padding: 0 20px; display: flex; align-items: center; justify-content: center; gap: 4px; pointer-events: auto; min-width: 400px; transition: all 0.3s ease; }
        .tb-btn { width: 40px; height: 40px; border-radius: var(--radius-md); border: none; background: transparent; color: var(--text-main); font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; position: relative; }
        .tb-btn:hover { background: var(--hover-bg); transform: translateY(-1px); }
        .tb-btn.running::after { content: ''; position: absolute; bottom: 2px; width: 6px; height: 3px; border-radius: 3px; background: var(--text-secondary); transition: all 0.2s; }
        .tb-btn.active-focus { background: var(--active-bg); }
        .tb-btn.active-focus::after { width: 16px; background: var(--accent); }
        
        #sys-tray { position: absolute; right: 10px; bottom: 6px; height: 48px; display: flex; align-items: center; z-index: 9000; pointer-events: auto; gap: 5px;}
        .tray-item { padding: 0 12px; height: 36px; border-radius: var(--radius-md); display: flex; align-items: center; gap: 8px; cursor: pointer; transition: background 0.15s; color: var(--text-main); font-size: 14px;}
        .tray-item:hover { background: var(--hover-bg); }
        .tray-clock { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.1; }

        #start-menu { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(20px) scale(0.95); width: 600px; height: 550px; border-radius: var(--radius-lg); padding: 24px; display: flex; flex-direction: column; gap: 20px; z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.25s cubic-bezier(0.1,0.9,0.2,1); }
        #start-menu.visible { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; pointer-events: auto; }
        .sm-search { width: 100%; padding: 12px 16px; border-radius: 20px; background: var(--input-bg); border: 1px solid var(--glass-border); color: var(--text-main); outline: none; }
        .sm-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
        .sm-app { display: flex; flex-direction: column; align-items: center; padding: 12px 4px; border-radius: var(--radius-md); cursor: pointer; transition: background 0.15s; gap: 8px; }
        .sm-app:hover { background: var(--hover-bg); }
        .sm-app span { font-size: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        .sm-app p { font-size: 12px; text-align: center; }
        
        .sm-footer { margin-top: auto; border-top: 1px solid var(--glass-border); padding-top: 16px; display: flex; justify-content: space-between; align-items: center; }
        .sm-power { width: 36px; height: 36px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: background 0.15s; }
        .sm-power:hover { background: #e81123; color: white; }

        /* ==========================================================================
           APP SPECIFIC STYLES
           ========================================================================== */
        /* Notepad */
        .app-notepad textarea { flex: 1; border: none; resize: none; padding: 16px; background: transparent; color: var(--text-main); font-family: 'Consolas', monospace; font-size: 14px; outline: none; }
        
        /* Terminal */
        .app-terminal { background: #0c0c0c; color: #ccc; font-family: 'Consolas', monospace; display: flex; flex-direction: column; height: 100%; font-size: 14px; }
        .term-output { padding: 16px; flex: 1; overflow-y: auto; white-space: pre-wrap; line-height: 1.5; }
        .term-input-line { display: flex; padding: 0 16px 16px 16px; }
        .term-prompt { color: #16c60c; margin-right: 8px; }
        .term-input { flex: 1; background: transparent; border: none; color: white; font-family: inherit; font-size: inherit; outline: none; }
        
        /* Calculator */
        .app-calc { display: flex; flex-direction: column; height: 100%; padding: 4px; }
        .calc-display { padding: 20px; font-size: 48px; text-align: right; background: transparent; border: none; color: var(--text-main); outline: none; }
        .calc-grid { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .calc-btn { border-radius: var(--radius-md); border: none; background: var(--hover-bg); color: var(--text-main); font-size: 20px; cursor: pointer; transition: background 0.1s; }
        .calc-btn:hover { background: var(--active-bg); }
        .calc-btn:active { transform: scale(0.95); }
        .calc-btn.op { background: rgba(0, 103, 192, 0.2); }
        .calc-btn.eq { background: var(--accent); color: white; }

        /* Explorer */
        .app-explorer { display: flex; flex-direction: column; height: 100%; }
        .exp-bar { padding: 10px; border-bottom: 1px solid var(--glass-border); display: flex; gap: 10px; background: rgba(0,0,0,0.1); }
        .exp-path { flex: 1; padding: 6px 12px; background: var(--input-bg); border-radius: var(--radius-md); border: 1px solid var(--glass-border); color: var(--text-main); }
        .exp-body { display: flex; flex: 1; }
        .exp-side { width: 200px; border-right: 1px solid var(--glass-border); padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .exp-side-item { padding: 8px 12px; border-radius: var(--radius-md); cursor: pointer; font-size: 13px; }
        .exp-side-item:hover { background: var(--hover-bg); }
        .exp-grid { flex: 1; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); align-content: start; gap: 15px; overflow-y: auto; }

        /* Easter Egg Toast */
        #toast { position: absolute; bottom: 80px; right: 20px; background: var(--accent); color: white; padding: 15px 25px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10000; transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.1,0.9,0.2,1); font-weight: 500;}
        #toast.show { transform: translateX(0); }

        /* Context Menu */
        #context-menu { position: absolute; z-index: 100000; width: 200px; padding: 6px; display: none; flex-direction: column; border-radius: var(--radius-md); }
        .cm-item { padding: 8px 12px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 12px; transition: background 0.15s; font-size: 13px; color: var(--text-main); }
        .cm-item:hover { background: var(--hover-bg); }
        .cm-item.danger:hover { background: #e81123; color: white; }
        .cm-divider { height: 1px; background: var(--glass-border); margin: 4px 0; }

        /* Copy & Cut Animations */
        @keyframes pulseCopy { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.15); filter: brightness(1.5); } 100% { transform: scale(1); filter: brightness(1); } }
        .copy-anim { animation: pulseCopy 0.4s ease-out; }
        .cut-item { opacity: 0.5; }

        /* Interactive Animations & Polish */
        .desktop-icon { transition: all 0.25s cubic-bezier(0.1, 0.9, 0.2, 1); transform: scale(1); }
        .desktop-icon:hover { transform: scale(1.05); }
        .desktop-icon:active { transform: scale(0.95); }
        
        .tb-btn { transition: all 0.25s cubic-bezier(0.1, 0.9, 0.2, 1); transform: scale(1); }
        .tb-btn:active { transform: scale(0.9); }

        .sys-window { transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 0.3s ease, left 0.3s cubic-bezier(0.1, 0.9, 0.2, 1), top 0.3s cubic-bezier(0.1, 0.9, 0.2, 1), width 0.3s cubic-bezier(0.1, 0.9, 0.2, 1), height 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); }
        .sys-window.dragging { transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 0.3s ease; } /* Disables position transition while dragging */

        @keyframes menuOpen { from { opacity: 0; transform: scale(0.95) translateY(-5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        #context-menu { animation: menuOpen 0.2s cubic-bezier(0.1, 0.9, 0.2, 1); transform-origin: top left; }

        /* Calendar Flyout */
        #calendar-flyout { position: absolute; bottom: 60px; right: 10px; width: 320px; border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 9999; opacity: 0; pointer-events: none; transform: translateY(20px) scale(0.95); transition: all 0.25s cubic-bezier(0.1,0.9,0.2,1); }
        #calendar-flyout.visible { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; font-size: 16px; font-weight: 600; padding: 0 5px;}
        .cal-nav-btn { background: transparent; border: none; color: var(--text-main); font-size: 16px; cursor: pointer; border-radius: 50%; width: 28px; height: 28px; transition: background 0.2s; }
        .cal-nav-btn:hover { background: var(--hover-bg); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day-header { font-size: 12px; color: var(--text-secondary); font-weight: 600; padding-bottom: 5px; }
        .cal-day { padding: 8px 0; border-radius: 50%; cursor: pointer; transition: all 0.2s; font-size: 13px; aspect-ratio: 1/1; display:flex; align-items:center; justify-content:center;}
        .cal-day:hover { background: var(--hover-bg); transform: scale(1.1); }
        .cal-day.today { background: var(--accent); color: white; font-weight: bold; box-shadow: 0 4px 10px rgba(0,103,192,0.4); }
        .cal-day.other-month { color: var(--text-secondary); opacity: 0.5; }

        /* Matrix Canvas */
        #matrix-bg { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; display: none; }

    </style>
</head>
<body>

    <!-- Matrix Easter Egg Background -->
    <canvas id="matrix-bg"></canvas>

    <!-- Desktop -->
    <div id="desktop" tabindex="0"></div>

    <!-- Window Layer -->
    <div id="window-container"></div>

    <!-- Calendar Flyout -->
    <div id="calendar-flyout" class="mica">
        <div class="cal-header">
            <span id="cal-month-year">Month Year</span>
            <div>
                <button class="cal-nav-btn" onclick="Calendar.prev()">&lt;</button>
                <button class="cal-nav-btn" onclick="Calendar.next()">&gt;</button>
            </div>
        </div>
        <div class="cal-grid">
            <div class="cal-day-header">Su</div><div class="cal-day-header">Mo</div><div class="cal-day-header">Tu</div><div class="cal-day-header">We</div><div class="cal-day-header">Th</div><div class="cal-day-header">Fr</div><div class="cal-day-header">Sa</div>
        </div>
        <div class="cal-grid" id="cal-days"></div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu" class="mica">
        <input type="text" class="sm-search" placeholder="Type here to search">
        <h4 style="margin-top: 10px;">Pinned</h4>
        <div class="sm-grid" id="sm-apps"></div>
        <div class="sm-footer">
            <div style="display:flex; align-items:center; gap:10px;">
                <div id="sm-avatar" style="width:32px; height:32px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:bold;">G</div>
                <span id="sm-username">Guest User</span>
            </div>
            <div class="sm-power" title="Shut down" onclick="System.shutdown()">⏻</div>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar-wrapper">
        <div id="taskbar" class="mica">
            <button class="tb-btn" style="color: var(--accent); font-size: 24px;" onclick="System.toggleStart(event)">❖</button>
            <div style="width:1px; height:24px; background:var(--glass-border); margin: 0 4px;"></div>
            <div id="tb-apps" style="display:flex; gap:4px;"></div>
        </div>
        
        <div id="sys-tray">
            <div class="tray-item" title="Quick Settings" onclick="EasterEggs.clickClock()">
                <div class="tray-icons" style="display:flex; gap:8px;">
                    <span>📶</span><span>🔊</span><span>🔋</span>
                </div>
            </div>
            <div class="tray-item" onclick="Calendar.toggle(event)">
                <div class="tray-clock">
                    <span id="sys-time" style="font-weight: 500;">00:00</span>
                    <span id="sys-date" style="font-size: 11px; color: var(--text-secondary);">00/00/00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Easter Egg Toast Notification -->
    <div id="toast">Achievement Unlocked!</div>

    <!-- Context Menu -->
    <div id="context-menu" class="mica"></div>

    <!-- FULL SCREEN OVERLAYS -->
    <!-- Logon Screen -->
    <div id="logon-screen" class="fullscreen-overlay">
        <div class="avatar-large" id="logon-avatar">G</div>
        <input type="text" id="logon-user" class="logon-name" value="Guest User" spellcheck="false" style="background: transparent; border: none; outline: none; text-align: center; font-family: inherit; width: 100%;" oninput="document.getElementById('logon-avatar').innerText = this.value ? this.value.charAt(0).toUpperCase() : '?'" onfocus="this.select()">
        <form class="logon-input-group" onsubmit="event.preventDefault(); System.login();">
            <input type="password" class="logon-input" id="logon-pwd" placeholder="Enter PIN or Password" autofocus>
            <button type="submit" class="logon-btn">➔</button>
        </form>
        <p style="margin-top: 20px; color: rgba(255,255,255,0.6); font-size: 12px;">Hint: Any password works. Try "matrix" for a surprise.</p>
    </div>

    <!-- Boot Screen -->
    <div id="boot-screen" class="fullscreen-overlay">
        <h1 style="font-size: 48px; color: #00a4ef; display: flex; align-items: center; gap: 15px;">❖</h1>
        <div class="spinner"></div>
    </div>

    <!-- Shutdown Screen -->
    <div id="shutdown-screen" class="fullscreen-overlay">
        <div class="spinner" style="margin-top: 0; margin-bottom: 20px;"></div>
        <h2 id="shutdown-text">Shutting down...</h2>
    </div>

    <script>
        /* ==========================================================================
           WINDOWS 12 ULTIMATE JAVASCRIPT KERNEL
           ========================================================================== */

        const apiKey = "";
        
        const GeminiAPI = {
            async ask(prompt, systemPrompt = "You are a helpful AI assistant built into Windows 12 Web OS.", retries = 5) {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                const delays = [1000, 2000, 4000, 8000, 16000];

                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";
                    } catch (error) {
                        if (i === retries - 1) return "Error connecting to AI service. Please try again later.";
                        await new Promise(resolve => setTimeout(resolve, delays[i]));
                    }
                }
            }
        };

        const PinnedApps = ['copilot', 'explorer', 'terminal', 'calc'];

        // --- 1. VIRTUAL FILE SYSTEM ---
        window.Clipboard = null; // Global clipboard for Cut/Copy/Paste
        
        // Global Rename Helper
        window.TriggerRename = (el, item, path, renderCallback) => {
            const p = el.querySelector('p');
            const oldName = item.name;
            p.innerHTML = `<input type="text" value="${item.name}" style="width:100%; color:black; text-align:center; outline:none; border-radius:4px; padding:2px; font-size:12px;">`;
            const input = p.querySelector('input');
            input.focus(); input.select();
            input.onclick = ev => ev.stopPropagation();
            input.onmousedown = ev => ev.stopPropagation();
            input.onkeydown = ev => { if(ev.key === 'Enter') input.blur(); };
            input.onblur = () => {
                const newName = input.value.trim() || oldName;
                item.name = newName;
                if (item.type === 'dir' && item.target) {
                    const oldTarget = item.target;
                    const newTarget = path === 'This PC' ? 'C:/' + newName : path + '/' + newName;
                    item.target = newTarget;
                    if (VFS[oldTarget]) {
                        VFS[newTarget] = VFS[oldTarget];
                        delete VFS[oldTarget];
                    }
                }
                renderCallback();
            };
        };

        const VFS = {
            'This PC': [
                { name: 'Local Disk (C:)', icon: '💽', type: 'dir', target: 'C:' },

                            <p style="color:#ccc; margin-bottom:20px;">Use Arrow Keys to move.</p>
                            <button id="${id}-startbtn" style="padding:10px 24px; background:var(--accent); color:white; border:none; border-radius:20px; cursor:pointer; font-weight:bold; font-size:16px; transition:filter 0.2s;" onmouseover="this.style.filter='brightness(1.2)'" onmouseout="this.style.filter='none'">Play</button>

                `,
                init: (id) => {
                    const canvas = document.getElementById(`${id}-canvas`);
                    const ctx = canvas.getContext('2d');
                    const scoreEl = document.getElementById(`${id}-score`);
                    const overlay = document.getElementById(`${id}-overlay`);
                    const startBtn = document.getElementById(`${id}-startbtn`);
                    const container = canvas.parentElement;

                    let snake = [{x: 10, y: 10}];
                    let food = {x: 15, y: 15};
                    let dx = 0, dy = 0, score = 0, interval;
                    
                    const gridSize = 20;
                    const tileCount = canvas.width / gridSize;

                    function initGame() {
                        snake = [{x: 10, y: 10}];
                        food = {x: 15, y: 15};
                        dx = 0; dy = 0;
                        score = 0;
                        scoreEl.innerText = `SCORE: ${score}`;
                        if(interval) clearInterval(interval);
                        ctx.fillStyle = '#000';
                        ctx.fillRect(0,0,canvas.width,canvas.height);
                        drawSnake();
                        drawFood();
                    }

                    function drawSnake() {
                        ctx.fillStyle = '#0f0';
                        snake.forEach(segment => {
                            ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
                        });
                    }

                    function drawFood() {
                        ctx.fillStyle = '#f00';
                        ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
                    }

                    function gameLoop() {
                        if (!document.getElementById(id)) {
                            clearInterval(interval);
                            return; // Stop loop if window was closed
                        }

                        const head = {x: snake[0].x + dx, y: snake[0].y + dy};

                        // Collision checks (walls & self)
                        if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some(s => s.x === head.x && s.y === head.y)) {
                            clearInterval(interval);
                            overlay.style.display = 'flex';
                            overlay.querySelector('h2').innerText = 'Game Over';
                            overlay.querySelector('p').innerText = `Final Score: ${score}`;
                            startBtn.innerText = 'Play Again';
                            return;
                        }

                        snake.unshift(head);

                        // Eat food
                        if (head.x === food.x && head.y === food.y) {
                            score += 10;
                            scoreEl.innerText = `SCORE: ${score}`;
                            food = {
                                x: Math.floor(Math.random() * tileCount),
                                y: Math.floor(Math.random() * tileCount)
                            };
                        } else {
                            snake.pop();
                        }

                        ctx.fillStyle = '#000';
                        ctx.fillRect(0,0,canvas.width,canvas.height);
                        drawFood();
                        drawSnake();
                    }

                        container.focus();
                        initGame();
                        dx = 1; dy = 0; // Move right initially
                        interval = setInterval(gameLoop, 100);
                    };

                        if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) {
                            e.preventDefault(); // Prevent window scrolling
                        }
                        
                        if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
                        else if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
                        else if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
                        else if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
                    });

                    initGame();
                }
            },

                        isPlaying = true;

                    function addPipe() {
                        let gap = 160; // Increased gap size
                        let minPipeHeight = 50;
                        let maxPipeHeight = canvas.height - gap - minPipeHeight - 30; // 30 is ground height
                        let topHeight = Math.floor(Math.random() * (maxPipeHeight - minPipeHeight + 1) + minPipeHeight);
                        pipes.push({ x: canvas.width, w: 60, top: topHeight, bottom: topHeight + gap, passed: false });
                    }

                    function drawBird() {
                        ctx.fillStyle = '#f1c40f'; // Yellow bird
                        ctx.beginPath();
                        ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        
                        // Bird Eye
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(bird.x + 5, bird.y - 5, 5, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = '#000';
                        ctx.beginPath();
                        ctx.arc(bird.x + 7, bird.y - 5, 2, 0, Math.PI*2);
                        ctx.fill();
                        
                        // Bird Wing
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.ellipse(bird.x - 4, bird.y + 2, 6, 4, 0, 0, Math.PI*2);
                        ctx.fill();
                        ctx.stroke();
                    }

                    function drawPipes() {
                        ctx.fillStyle = '#2ecc71'; // Green pipes
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 2;
                        
                        pipes.forEach(p => {
                            // Top pipe
                            ctx.fillRect(p.x, 0, p.w, p.top);
                            ctx.strokeRect(p.x, 0, p.w, p.top);
                            // Top pipe cap
                            ctx.fillRect(p.x - 4, p.top - 20, p.w + 8, 20);
                            ctx.strokeRect(p.x - 4, p.top - 20, p.w + 8, 20);

                            // Bottom pipe
                            ctx.fillRect(p.x, p.bottom, p.w, canvas.height - p.bottom - 30);
                            ctx.strokeRect(p.x, p.bottom, p.w, canvas.height - p.bottom - 30);
                            // Bottom pipe cap
                            ctx.fillRect(p.x - 4, p.bottom, p.w + 8, 20);
                            ctx.strokeRect(p.x - 4, p.bottom, p.w + 8, 20);
                        });
                    }

                    function update() {
                        if (!document.getElementById(id)) {
                            cancelAnimationFrame(gameLoopId);
                            return; // Stop if window closed
                        }

                        if (!isPlaying) return;

                        // Physics
                        bird.velocity += bird.gravity;
                        bird.y += bird.velocity;

                        // Pipe Logic
                        if (pipes.length > 0 && pipes[pipes.length - 1].x < canvas.width - 280) {
                            addPipe();
                        }

                        pipes.forEach(p => {
                            p.x -= 2; // Game speed (slower)

                            // Collision Box
                            if (bird.x + bird.radius - 2 > p.x && bird.x - bird.radius + 2 < p.x + p.w) {
                                if (bird.y - bird.radius + 2 < p.top || bird.y + bird.radius - 2 > p.bottom) {
                                    gameOver();
                                }
                            }

                            // Update Score
                            if (p.x + p.w < bird.x && !p.passed) {
                                score++;
                                scoreDisplay.innerText = score;
                                p.passed = true;
                            }
                        });

                        // Clean up pipes
                        pipes = pipes.filter(p => p.x + p.w > -10);

                        // Ground/Ceiling Collision
                        if (bird.y + bird.radius >= canvas.height - 30 || bird.y - bird.radius <= 0) {
                            gameOver();
                        }
                    }

                    function draw() {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        
                        drawPipes();
                        
                        // Draw Ground
                        ctx.fillStyle = '#ded895';
                        ctx.fillRect(0, canvas.height - 30, canvas.width, 30);
                        ctx.fillStyle = '#73bf2e';
                        ctx.fillRect(0, canvas.height - 30, canvas.width, 6);
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(0, canvas.height - 30);
                        ctx.lineTo(canvas.width, canvas.height - 30);
                        ctx.stroke();

                        drawBird();
                    }

                    function loop() {
                        update();
                        draw();

                            gameLoopId = requestAnimationFrame(loop);
                        }
                    }

                            flap(e);
                        }
                    });
                    container.addEventListener('mousedown', flap);
                    
                    // Render initial state

                }

            render: () => {
                const year = Calendar.currentDate.getFullYear();
                const month = Calendar.currentDate.getMonth();
                const today = new Date();

                document.getElementById('cal-month-year').innerText = new Date(year, month).toLocaleString('default', { month: 'long', year: 'numeric' });

                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const daysInPrevMonth = new Date(year, month, 0).getDate();

                const daysEl = document.getElementById('cal-days');
                daysEl.innerHTML = '';

                // Previous month's trailing days
                for (let i = 0; i < firstDay; i++) {
                    daysEl.innerHTML += `<div class="cal-day other-month">${daysInPrevMonth - firstDay + i + 1}</div>`;
                }

                // Current month's days
                for (let i = 1; i <= daysInMonth; i++) {
                    const isToday = i === today.getDate() && month === today.getMonth() && year === today.getFullYear();
                    daysEl.innerHTML += `<div class="cal-day ${isToday ? 'today' : ''}">${i}</div>`;
                }

                // Next month's leading days
                const totalCells = firstDay + daysInMonth;
                const nextDays = (7 - (totalCells % 7)) % 7;
                for (let i = 1; i <= nextDays; i++) {
                    daysEl.innerHTML += `<div class="cal-day other-month">${i}</div>`;
                }
            },

                Calendar.currentDate.setMonth(Calendar.currentDate.getMonth() - 1);
                Calendar.render();
            },
            next: () => {
                Calendar.currentDate.setMonth(Calendar.currentDate.getMonth() + 1);
                Calendar.render();
            },
            toggle: (e) => {
                if (e) e.stopPropagation();
                document.getElementById('calendar-flyout').classList.toggle('visible');
                document.getElementById('start-menu').classList.remove('visible');
            }
        };

        // --- 6. EASTER EGGS ---
        const EasterEggs = {
            toastTimeout: null,
            clockClicks: 0,
            showToast: (msg) => {
                const t = document.getElementById('toast');
                t.innerText = msg;
                t.classList.add('show');
                clearTimeout(EasterEggs.toastTimeout);
                EasterEggs.toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
            },
            showProgressToast: (msg, duration, callback) => {
                const t = document.getElementById('toast');
                t.innerHTML = `<div style="display:flex; flex-direction:column; gap:8px;"><span>${msg}</span><div style="width:100%; height:4px; background:rgba(0,0,0,0.2); border-radius:2px; overflow:hidden;"><div id="toast-progress" style="height:100%; background:white; width:0%; transition:width 0.05s linear;"></div></div></div>`;
                t.classList.add('show');
                let start = Date.now();
                clearTimeout(EasterEggs.toastTimeout);
                let interval = setInterval(() => {
                    let p = Math.min(100, ((Date.now() - start) / duration) * 100);
                    const progEl = document.getElementById('toast-progress');
                    if(progEl) progEl.style.width = p + '%';
                    if(p >= 100) {
                        clearInterval(interval);
                        setTimeout(() => { 
                            t.classList.remove('show'); 
                            if(callback) callback(); 
                        }, 300);
                    }
                }, 30);
            },
            clickClock: () => {
                EasterEggs.clockClicks++;
                if(EasterEggs.clockClicks === 5) {
                    EasterEggs.showToast("Developer Mode unlocked! 🛠️ (Not really, but good job)");
                    EasterEggs.clockClicks = 0;
                }
                setTimeout(() => EasterEggs.clockClicks = 0, 2000);
            },
            startMatrix: () => {
                EasterEggs.showToast("Entering the Matrix...");
                const cvs = document.getElementById('matrix-bg');
                cvs.style.display = 'block';
                const ctx = cvs.getContext('2d');
                cvs.width = window.innerWidth; cvs.height = window.innerHeight;
                
                const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()".split("");
                const font_size = 14;
                const columns = cvs.width / font_size;
                const drops = [];
                for(let x = 0; x < columns; x++) drops[x] = 1;

                setInterval(() => {
                    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                    ctx.fillRect(0, 0, cvs.width, cvs.height);
                    ctx.fillStyle = "#0F0"; ctx.font = font_size + "px monospace";
                    for(let i = 0; i < drops.length; i++) {
                        const text = chars[Math.floor(Math.random() * chars.length)];
                        ctx.fillText(text, i * font_size, drops[i] * font_size);
                        if(drops[i] * font_size > cvs.height && Math.random() > 0.975) drops[i] = 0;
                        drops[i]++;
                    }
                }, 33);
            }
        };

        // --- 6. CONTEXT MENU SYSTEM ---
        const ContextMenu = {
            init: () => {
                document.addEventListener('click', () => ContextMenu.hide());
            },
            show: (x, y, options) => {
                const cm = document.getElementById('context-menu');
                cm.innerHTML = '';
                
                options.forEach(opt => {
                    if (opt === 'divider') {
                        cm.innerHTML += '<div class="cm-divider"></div>';
                        return;
                    }
                    const el = document.createElement('div');
                    el.className = `cm-item ${opt.danger ? 'danger' : ''}`;
                    el.innerHTML = `<span style="width: 20px; text-align: center;">${opt.icon || ''}</span> <span>${opt.label}</span>`;
                    el.onclick = (e) => { e.stopPropagation(); ContextMenu.hide(); opt.action(); };
                    cm.appendChild(el);
                });

                cm.style.display = 'flex';
                
                // Keep menu inside screen bounds
                const rect = cm.getBoundingClientRect();
                if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width - 5;
                if (y + rect.height > window.innerHeight - 50) y = window.innerHeight - rect.height - 55;
                
                cm.style.left = `${x}px`;
                cm.style.top = `${y}px`;
            },
            hide: () => {
                document.getElementById('context-menu').style.display = 'none';
            }
        };

        // Global click listener to close open menus
        document.addEventListener('click', (e) => {
            const sm = document.getElementById('start-menu');
            const cal = document.getElementById('calendar-flyout');
            
            if (sm.classList.contains('visible') && !e.target.closest('#start-menu') && !e.target.closest('.tb-start-btn')) {
                sm.classList.remove('visible');
            }
            if (cal.classList.contains('visible') && !e.target.closest('#calendar-flyout') && !e.target.closest('.tray-clock')) {
                cal.classList.remove('visible');
            }
        });

        // Konami Code Listener
        const konami = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
        let konamiIndex = 0;
        document.addEventListener('keydown', (e) => {
            if(e.key === konami[konamiIndex]) {
                konamiIndex++;
                if(konamiIndex === konami.length) {
                    EasterEggs.showToast("Gravity Inversion Activated 🙃");
                    document.body.style.transform = "rotate(180deg)";
                    konamiIndex = 0;
                }
            } else {
                konamiIndex = 0;
            }
        });

        // Close start menu on desktop click
        document.getElementById('desktop').addEventListener('click', () => {
            document.getElementById('start-menu').classList.remove('visible');
        });

        // Start Boot
        window.onload = System.init;

    </script>
</body>
</html>
